model_name: meta-llama/Llama-3.2-3B-Instruct
trust_remote_code: false
device: cuda
dtype: bfloat16

data_path: ../data/processed/invarirank_movielens/25/test.jsonl
output_dir: ../runs/eval/invarirank_movielens
ranked_lists_path: ../runs/eval/invarirank_movielens/ranked_lists.json
adapter_path: ../runs/train/invarirank_movielens/checkpoints/final

max_seq_length: 4096
ranking_num_samples: 100
eval_num_permutations: 10
val_perms_deterministic: true

prompt_style: invarirank
prompt_template: invarirank
span_start_token: "[SPAN]"
span_end_token: "[/SPAN]"
item_start_token: "[ITEM]"
item_end_token: "[/ITEM]"
attention_mask: block
position_ids: shared
span_causal: true

seed: 42